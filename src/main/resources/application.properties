spring.application.name=hospital-management-db

server.port=7778

# MySQL Connection
# database properties -> used to connect to mysql database
spring.datasource.url=jdbc:mysql://localhost:3306/hospital_db_june2026
spring.datasource.username=root
spring.datasource.password=root1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate
#for automatically update database after every change
spring.jpa.hibernate.ddl-auto=update
# Shows the SQL statements in the console for debugging
spring.jpa.show-sql=true
#it converts the java data types into database data type
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect